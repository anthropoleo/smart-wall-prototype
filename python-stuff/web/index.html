<!doctype html>
<!--
  LED Wall Controller dashboard UI.

  Served by FastAPI (`python-stuff/server.py`) at `/`.
  Admin controls are available at `/admin`.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LED Wall Dashboard</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body data-app-mode="dashboard">
    <main class="wrap">
      <header class="header panel">
        <div class="brand-lockup">
          <img
            class="brand-logo"
            src="/static/assets/images/on-belay-logo.svg"
            alt="ON BELAY Climbing"
            decoding="async"
          />
          <h1>LED Wall Dashboard</h1>
        </div>
        <div class="status" id="status">Disconnected</div>
      </header>

      <div class="workspace">
        <section class="panel wall-panel">
          <div class="grid-top">
            <h2>5 x 7 Grid (35 LEDs)</h2>
            <span class="mono" id="selectedInfo">Selected LED: 1</span>
          </div>
          <div class="hint">
            Select a saved route to preview and apply it.
          </div>
          <div class="grid-shell">
            <div class="strip" id="strip"></div>
          </div>
        </section>

        <aside class="panel routes-panel">
          <div class="routes-head">
            <h2>Saved Routes</h2>
            <button id="reloadRoutesBtn" type="button">Reload</button>
          </div>
          <div class="hint">
            Levels 4-7 contain 3 saved routes each.
          </div>
          <div class="route-folders" id="routeFolders"></div>
          <div class="mono" id="routeSelection">Selected route: none</div>
          <div class="routes-actions">
            <a class="admin-link" href="/freestyle">Freestyle</a>
            <a class="admin-link" href="/admin">Admin Controls</a>
          </div>
        </aside>
      </div>
    </main>

    <script type="module" src="/static/main.js"></script>
  </body>
</html>
